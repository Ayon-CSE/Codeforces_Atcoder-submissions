name: Harwest Submissions

on:
  schedule:
    # Runs at 11:00 PM BDT (5:00 PM UTC) every day
    - cron: '0 17 * * *'
  
  workflow_dispatch:
    inputs:
      full_scan:
        description: 'Run full scan of all submissions'
        required: false
        default: false
        type: boolean

jobs:
  harwest:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install Harwest
      run: pip install harwest-tool
    
    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
    
    - name: Run Harwest - Full Scan
      if: github.event.inputs.full_scan == 'true' || github.event_name == 'schedule'
      run: |
        harwest cf --username Ayon --out-dir submissions/codeforces
        harwest at --username AyonCoder --out-dir submissions/atcoder
    
    - name: Commit and Push
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          git add -A
          git commit -m "Harwest: Update submissions on $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        else
          echo "No new submissions found"
        fi
