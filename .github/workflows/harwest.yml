name: Fetch Codeforces Submissions

on:
  push:
    branches:
      - main
  schedule:
    # Runs daily at 12:00 AM UTC
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  fetch_solutions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Fetch Codeforces Submissions
        run: python fetch_submissions.py

      - name: Commit and Push
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Update Codeforces submissions on $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          else
            echo "No new submissions found"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
